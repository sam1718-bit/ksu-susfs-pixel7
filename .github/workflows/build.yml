name: Build KernelSU-Next & SuSFS for Pixel 7 (GKI 6.1)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Setup build environment & Git config
        run: |
          sudo apt-get update
          sudo apt-get install -y git ccache bison flex libssl-dev libelf-dev zip cpio build-essential python3 curl
          
          # Git 기본 식별 정보 설정
          git config --global user.name "Builder"
          git config --global user.email "builder@example.com"

          # repo 툴 설치
          sudo curl https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod a+rx /usr/local/bin/repo

      - name: Download Google GKI Kernel Source & Apply Patches
        run: |
          mkdir android-kernel && cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --depth=1
          repo sync -j$(nproc)

          # 커널 소스 폴더 진입
          cd common

          # 내 폰의 순정 버전명 (6.1.157-android14-11) 강제 지정
          export EXTRAVERSION="-android14-11-gsu"

          # KernelSU-Next 직접 소스 주입
          git clone https://github.com/KernelSU-Next/KernelSU-Next.git drivers/kernelsu
          echo 'obj-y += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

          # SuSFS 1.5.2 커널 패치 직접 주입
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android14-6.1 susfs
          cp susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch drivers/kernelsu/ || true
          cp susfs/kernel_patches/fs/* fs/ || true
          cp susfs/kernel_patches/include/linux/* include/linux/ || true
          cd drivers/kernelsu && patch -p1 < 10_enable_susfs_for_ksu.patch || true

      - name: Compile GKI Kernel
        run: |
          cd android-kernel
          LTO=thin ./build/build.sh

      - name: Upload Custom boot.img Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Next-SuSFS-Pixel7-BootImage
          path: android-kernel/out/**/dist/boot.img
